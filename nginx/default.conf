server {
    listen 80;
    server_name ent.timote.ovh;

    # Frontend React
    location / {
        proxy_pass http://frontend:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /univ-api/ {
        proxy_pass https://planning.univ-rennes1.fr/;
        proxy_ssl_server_name on; 
    }
}